name: Desert Frontline CI Results

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  ci-results:
    name: Build and package CI results
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare CI results
        shell: bash
        run: |
          set -euo pipefail
          rm -rf ci-results .derivedData-ci
          mkdir -p ci-results
          printf 'Desert Frontline CI run %s attempt %s\n' "$GITHUB_RUN_ID" "$GITHUB_RUN_ATTEMPT" > ci-results/ci-run.log

      - name: Static checks
        id: static-checks
        continue-on-error: true
        shell: bash
        env:
          BASE_SHA: ${{ github.event.before }}
        run: |
          set -o pipefail
          {
            zero_sha="0000000000000000000000000000000000000000"
            if [[ -n "${BASE_SHA:-}" && "$BASE_SHA" != "$zero_sha" ]] && git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
              git diff --check "$BASE_SHA" HEAD
            elif git rev-parse HEAD^ >/dev/null 2>&1; then
              git diff --check HEAD^ HEAD
            else
              git diff --check
            fi
          } 2>&1 | tee ci-results/static-checks.log

      - name: Project lint
        id: project-lint
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          plutil -lint DesertFrontline.xcodeproj/project.pbxproj 2>&1 | tee ci-results/project-lint.log

      - name: Xcode generic iOS build
        id: xcode-build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          rm -rf ci-results/DesertFrontline.xcresult .derivedData-ci
          /Applications/Xcode.app/Contents/Developer/usr/bin/xcodebuild \
            -project DesertFrontline.xcodeproj \
            -scheme DesertFrontline \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath .derivedData-ci \
            -resultBundlePath ci-results/DesertFrontline.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee ci-results/xcodebuild.log

      - name: iOS simulator launch probe
        id: simulator-launch
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          {
            set -euo pipefail
            rm -rf .derivedData-sim ci-results/simulator-screenshot.png ci-results/simulator-hud-build.png ci-results/simulator-hud-air.png ci-results/simulator-hud-naval.png ci-results/simulator-hud-support.png ci-results/simulator-app.log

            /Applications/Xcode.app/Contents/Developer/usr/bin/xcodebuild \
              -project DesertFrontline.xcodeproj \
              -scheme DesertFrontline \
              -configuration Debug \
              -sdk iphonesimulator \
              -destination 'generic/platform=iOS Simulator' \
              -derivedDataPath .derivedData-sim \
              CODE_SIGNING_ALLOWED=NO \
              build

            app_path="$(find .derivedData-sim/Build/Products/Debug-iphonesimulator -name 'DesertFrontline.app' -type d -print -quit)"
            if [[ -z "${app_path}" ]]; then
              echo "DesertFrontline.app not found in simulator build products."
              exit 1
            fi

            sim_udid="$(xcrun simctl list devices available --json | python3 -c 'import json, sys; data = json.load(sys.stdin); devices = [device for runtime, runtime_devices in data.get("devices", {}).items() if "iOS" in runtime for device in runtime_devices if device.get("isAvailable") and device.get("name", "").startswith("iPhone")]; print(devices[0]["udid"] if devices else "", end=""); sys.exit(0 if devices else 1)')"
            echo "Using simulator ${sim_udid}"

            xcrun simctl boot "${sim_udid}" || true
            xcrun simctl bootstatus "${sim_udid}" -b
            xcrun simctl install "${sim_udid}" "${app_path}"
            bundle_id="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "${app_path}/Info.plist")"
            launch_hud_page() {
              local page="$1"
              local screenshot_path="$2"
              local wait_seconds="$3"
              local launch_output
              local app_pid

              echo "Launching ${bundle_id} with HUD page ${page}"
              launch_output="$(SIMCTL_CHILD_DESERT_CI_CAMERA_FOCUS=air SIMCTL_CHILD_DESERT_CI_CAPTURE_MODE=1 SIMCTL_CHILD_DESERT_CI_HUD_PAGE="${page}" xcrun simctl launch --terminate-running-process "${sim_udid}" "${bundle_id}")"
              echo "${launch_output}"
              app_pid="${launch_output##*: }"
              if [[ ! "${app_pid}" =~ ^[0-9]+$ ]]; then
                echo "Could not parse app PID from simctl launch output: ${launch_output}"
                exit 1
              fi
              sleep "${wait_seconds}"
              xcrun simctl io "${sim_udid}" screenshot "${screenshot_path}"
              if ! kill -0 "${app_pid}" 2>/dev/null; then
                echo "DesertFrontline ${page} HUD process ${app_pid} exited during the launch probe."
                exit 1
              fi
              echo "DesertFrontline ${page} HUD process ${app_pid} is still running."
            }

            launch_hud_page tactical ci-results/simulator-screenshot.png 8
            launch_hud_page build ci-results/simulator-hud-build.png 4
            launch_hud_page air ci-results/simulator-hud-air.png 4
            launch_hud_page naval ci-results/simulator-hud-naval.png 4
            launch_hud_page support ci-results/simulator-hud-support.png 4
            xcrun simctl spawn "${sim_udid}" log show --last 2m --predicate 'process == "DesertFrontline"' > ci-results/simulator-app.log || true
            xcrun simctl shutdown "${sim_udid}" || true
          } 2>&1 | tee ci-results/simulator-launch.log

      - name: Write manifest and summaries
        id: package-metadata
        shell: bash
        env:
          STATIC_OUTCOME: ${{ steps.static-checks.outcome }}
          PROJECT_LINT_OUTCOME: ${{ steps.project-lint.outcome }}
          BUILD_OUTCOME: ${{ steps.xcode-build.outcome }}
          SIMULATOR_LAUNCH_OUTCOME: ${{ steps.simulator-launch.outcome }}
          WORKFLOW_NAME: ${{ github.workflow }}
        run: |
          set -euo pipefail
          short_sha="$(git rev-parse --short=12 HEAD)"
          branch_slug="$(printf '%s' "${GITHUB_REF_NAME}" | tr '/[:upper:]' '-[:lower:]')"
          commit_subject="$(git log -1 --pretty=%s)"
          version="$(printf '%s' "$commit_subject" | sed -E 's/^([^:]+):.*/\1/')"
          if [[ ! "$version" =~ ^v[0-9]+(\.[0-9]+)?$ ]]; then
            version="unversioned"
          fi
          created_at="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          artifact_name="desert-frontline-ci-${version}-${branch_slug}-${short_sha}-run${GITHUB_RUN_ID}-attempt${GITHUB_RUN_ATTEMPT}"
          echo "artifact_name=${artifact_name}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "created_at=${created_at}" >> "$GITHUB_OUTPUT"
          export CI_VERSION="$version"
          export CI_SHORT_SHA="$short_sha"
          export CI_CREATED_AT="$created_at"

          failure_count=0
          for outcome in "$STATIC_OUTCOME" "$PROJECT_LINT_OUTCOME" "$BUILD_OUTCOME" "$SIMULATOR_LAUNCH_OUTCOME"; do
            if [[ "$outcome" != "success" ]]; then
              failure_count=$((failure_count + 1))
            fi
          done

          cat > ci-results/ci-failure-summary.md <<EOF
          # Desert Frontline CI Failure Summary

          - Branch: ${GITHUB_REF_NAME}
          - Commit: ${GITHUB_SHA}
          - Run: ${GITHUB_RUN_ID}
          - Attempt: ${GITHUB_RUN_ATTEMPT}
          - Static checks: ${STATIC_OUTCOME}
          - Project lint: ${PROJECT_LINT_OUTCOME}
          - Build: ${BUILD_OUTCOME}
          - Simulator launch probe: ${SIMULATOR_LAUNCH_OUTCOME}
          - XCTest: skipped (no XCTest target exists in the current project)

          Logs:

          - ci-results/static-checks.log
          - ci-results/project-lint.log
          - ci-results/xcodebuild.log
          - ci-results/simulator-launch.log
          - ci-results/simulator-app.log
          EOF

          python3 - <<'PY'
          import json
          import os
          import pathlib
          import xml.sax.saxutils as sax

          results_dir = pathlib.Path("ci-results")
          static_outcome = os.environ["STATIC_OUTCOME"]
          project_lint_outcome = os.environ["PROJECT_LINT_OUTCOME"]
          build_outcome = os.environ["BUILD_OUTCOME"]
          simulator_launch_outcome = os.environ["SIMULATOR_LAUNCH_OUTCOME"]
          failure_count = sum(
              outcome != "success"
              for outcome in (
                  static_outcome,
                  project_lint_outcome,
                  build_outcome,
                  simulator_launch_outcome,
              )
          )

          checks = [
              ("static-checks", static_outcome, "ci-results/static-checks.log"),
              ("project-lint", project_lint_outcome, "ci-results/project-lint.log"),
              ("xcode-build", build_outcome, "ci-results/xcodebuild.log"),
              ("simulator-launch", simulator_launch_outcome, "ci-results/simulator-launch.log"),
          ]
          testcases = []
          for name, outcome, log_path in checks:
              failure = ""
              if outcome != "success":
                  failure = (
                      f'<failure message="{sax.escape(outcome)}">'
                      f'See {sax.escape(log_path)}</failure>'
                  )
              testcases.append(
                  f'    <testcase classname="DesertFrontlineCI" name="{sax.escape(name)}">'
                  f'{failure}</testcase>'
              )
          junit = (
              '<?xml version="1.0" encoding="UTF-8"?>\n'
              f'<testsuite name="DesertFrontlineCI" tests="{len(checks)}" '
              f'failures="{failure_count}" skipped="1">\n'
              + "\n".join(testcases)
              + '\n    <testcase classname="DesertFrontlineCI" name="xctest">'
              '<skipped message="No XCTest target exists in the current project"/>'
              '</testcase>\n'
              '</testsuite>\n'
          )
          (results_dir / "junit.xml").write_text(junit, encoding="utf-8")

          manifest = {
              "version": os.environ["CI_VERSION"],
              "branch": os.environ["GITHUB_REF_NAME"],
              "commitSha": os.environ["GITHUB_SHA"],
              "shortSha": os.environ["CI_SHORT_SHA"],
              "runId": os.environ["GITHUB_RUN_ID"],
              "runAttempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "workflowName": os.environ["WORKFLOW_NAME"],
              "createdAt": os.environ.get("CI_CREATED_AT", ""),
              "projectName": "Desert Frontline",
              "scheme": "DesertFrontline",
              "destination": "generic/platform=iOS",
              "resultBundlePath": "ci-results/DesertFrontline.xcresult",
              "junitPath": "ci-results/junit.xml",
              "buildLogPath": "ci-results/xcodebuild.log",
              "simulatorLaunchLogPath": "ci-results/simulator-launch.log",
              "failureSummaryPath": "ci-results/ci-failure-summary.md",
              "staticChecksOutcome": static_outcome,
              "projectLintOutcome": project_lint_outcome,
              "buildOutcome": build_outcome,
              "simulatorLaunchOutcome": simulator_launch_outcome,
              "testOutcome": "skipped",
              "projectSpecificReports": [
                  "ci-results/DesertFrontline.xcresult",
                  "ci-results/simulator-launch.log",
                  "ci-results/simulator-app.log",
                  "ci-results/simulator-screenshot.png",
                  "ci-results/simulator-hud-build.png",
                  "ci-results/simulator-hud-air.png",
                  "ci-results/simulator-hud-naval.png",
                  "ci-results/simulator-hud-support.png",
              ],
          }
          (results_dir / "ci-artifact-manifest.json").write_text(
              json.dumps(manifest, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload CI results
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package-metadata.outputs.artifact_name }}
          path: ci-results
          if-no-files-found: error
          retention-days: 14

      - name: Fail on unsuccessful checks
        shell: bash
        env:
          STATIC_OUTCOME: ${{ steps.static-checks.outcome }}
          PROJECT_LINT_OUTCOME: ${{ steps.project-lint.outcome }}
          BUILD_OUTCOME: ${{ steps.xcode-build.outcome }}
          SIMULATOR_LAUNCH_OUTCOME: ${{ steps.simulator-launch.outcome }}
        run: |
          set -euo pipefail
          if [[ "$STATIC_OUTCOME" != "success" || "$PROJECT_LINT_OUTCOME" != "success" || "$BUILD_OUTCOME" != "success" || "$SIMULATOR_LAUNCH_OUTCOME" != "success" ]]; then
            echo "One or more CI checks failed. Download the CI results artifact for details."
            exit 1
          fi
